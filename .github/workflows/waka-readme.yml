name: Waka Readme

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  update-readme:
    name: Update Waka stats
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SHOW_TITLE: "False"
          SHOW_TIME: "True"
          SHOW_TOTAL: "False"
          BLOCKS: "░▒▓█"
          TIME_RANGE: "last_7_days"
          COMMIT_MESSAGE: "chore: waka stats 업데이트"
